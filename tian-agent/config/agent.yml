#external_data_path: data/external/records.csv

# 传入模型的对话记忆窗口（按轮次计：1轮通常为 1 条 user + 1 条 assistant）
conversation_window_rounds: 10

# 是否启用较早历史的摘要压缩
conversation_summary_enabled: true

# 是否将摘要记忆持久化到磁盘（跨刷新/重启保留）
conversation_summary_persist_enabled: true

# 摘要记忆存储目录（相对 tian-agent 工程根目录）
conversation_summary_store_dir: data/conversation_memory

# unify-gateway 根地址（/unify-api 前缀与前端一致）。可被环境变量 UNIFY_API_BASE_URL 覆盖。
unify_api_base_url: "http://127.0.0.1:7070"
