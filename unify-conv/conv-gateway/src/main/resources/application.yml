server:
  port: 7070

spring:
  application:
    name: unify-gateway
  # 避免转发较大 JSON 时 in-memory buffer 过小（偶发表现为下游收到空 body）
  codec:
    max-in-memory-size: 10MB
  cloud:
    nacos:
      # 必须与「电商 Spring Cloud Gateway」注册到的是同一个 Nacos（同一 server-addr / namespace / group）。
      # 否则 lb://gateway 在本地拉不到实例，/upload、/api 转发会失败。
      # 若 elm-gateway bootstrap 里是其它地址（如内网 IP），这里应改成同一套，或在 Nacos 控制台确认
      # 「服务列表」里能看到 gateway、unify-gateway 两个服务且均为健康。
      server-addr: bobchasm.cn:8848
      username: nacos
      password: nacos
      discovery:
        server-addr: ${spring.cloud.nacos.server-addr}
        # 电商侧若使用非 public 命名空间，在此填写与电商相同的 namespace（UUID），与 group 一致。
        # namespace:
        # group: DEFAULT_GROUP
    gateway:
      routes:
        # 电商服务集群
        - id: gateway
          uri: lb://gateway
          predicates:
            # /upload 与 /upload/** 都需匹配（仅 /** 时部分版本不匹配无前缀子路径的 /upload）
            - Path=/api/**,/ws/**,/upload,/upload/**

        - id: unify-news
          uri: lb://unify-news
          predicates:
            - Path=/unify-api/news/**

        - id: unify-transaction
          uri: lb://unify-transaction
          predicates:
            - Path=/unify-api/transaction/**

        - id: unify-memo
          uri: lb://unify-memo
          predicates:
            - Path=/unify-api/memo/**

unify:
  auth:
    excludePaths:
      - /api/**
      - /ws/**
      # 校园新闻异步爬取：首页「刷新」触发，无需登录（若需管控可改为鉴权并去掉此项）
      - /unify-api/news/schoolNews/**

# JWT配置
jwt:
  secret: abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz123456
  token-validity-in-seconds: 86400
  token-validity-in-seconds-for-remember-me: 108000

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.tju.elm.gateway: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.netty: DEBUG